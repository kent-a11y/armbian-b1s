# Amlogic S912 (Meson GXM) B1S - 3GB RAM
# WiFi: AP6255 (BCM43455), 以太网: 内部 100M PHY (RMII)
# 基于 gxm-q200-3g.dts 逆向分析

BOARD_NAME="B1S"
BOARDFAMILY="meson-gxl"
BOARD_MAINTAINER=""

# NOTE: S912 主线 U-Boot 使用 khadas-vim2 的 defconfig 兼容
BOOTCONFIG="khadas-vim2_defconfig"

# U-Boot FIP 签名:从 khadas-vim2_defconfig 编译主线 U-Boot 后,用 Amlogic FIP blob
# 签名生成可引导的 u-boot.bin.sd.bin(沿用家族默认 UBOOT_TARGET_MAP)。
# 自定义板 b1s 不在 meson-gxl 家族 uboot_custom_postprocess() 的内置名单里,
# 因此后处理在 userpatches/lib.config 中重新定义,显式为 b1s 执行 gxl 后处理。
# FIP blob 取 khadas-vim2 目录(bl30/bl2/bl31 等为 S912 SoC 级固件,与板级 DTS 无关)。

KERNEL_TARGET="current,edge"

SERIALCON="ttyAML0"

# 仅加载 B1S 专属设备树
BOOT_FDT_FILE="amlogic/meson-gxm-b1s.dtb"
