name: Build Armbian B1S Image

on:
  # 手动触发构建
  workflow_dispatch:
    inputs:
      release:
        description: '发行版'
        required: true
        default: 'bookworm'
        type: choice
        options:
          - bookworm
          - trixie
          - noble
      branch:
        description: '内核分支'
        required: true
        default: 'current'
        type: choice
        options:
          - current
          - edge
      build_type:
        description: '构建类型'
        required: true
        default: 'minimal'
        type: choice
        options:
          - minimal
          - server

jobs:
  build:
    runs-on: ubuntu-24.04
    name: "B1S - ${{ inputs.release }} - ${{ inputs.branch }}"

    steps:
      - name: 签出仓库
        uses: actions/checkout@v4

      - name: 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get -y autoremove --purge
          sudo apt-get clean
          echo "=== 剩余磁盘空间 ==="
          df -h /

      - name: 克隆 Armbian 构建框架
        run: |
          git clone --depth=1 https://github.com/armbian/build armbian-build

      - name: 注入 userpatches
        run: |
          cp -rv userpatches/ armbian-build/userpatches/
          echo "=== userpatches 目录内容 ==="
          find armbian-build/userpatches/ -type f

      - name: 配置 QEMU 跨架构仿真
        uses: docker/setup-qemu-action@v3

      - name: 编译 Armbian 镜像
        run: |
          cd armbian-build
          ./compile.sh \
            BOARD=b1s \
            BRANCH=${{ inputs.branch }} \
            RELEASE=${{ inputs.release }} \
            BUILD_MINIMAL=${{ inputs.build_type == 'minimal' && 'yes' || 'no' }} \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            KERNEL_BTF=no \
            EXPERT=yes \
            COMPRESS_OUTPUTIMAGE="sha,img,xz"

      - name: 上传镜像
        uses: actions/upload-artifact@v4
        with:
          name: "armbian-b1s-${{ inputs.release }}-${{ inputs.branch }}"
          path: |
            armbian-build/output/images/*.img.xz
            armbian-build/output/images/*.sha
          retention-days: 14

      - name: 上传内核 deb 包
        uses: actions/upload-artifact@v4
        with:
          name: "armbian-b1s-kernel-${{ inputs.branch }}"
          path: armbian-build/output/debs/linux-*.deb
          retention-days: 14
